<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>3D Print Quote System - Final Version</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg-main: #ffffff; --bg-sidebar: #f2f4f7; --text-main: #333333; --primary: #d44638; --accent: #0046ad; }
        body { font-family: 'Kanit', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg-main); overflow: hidden; }
        
        /* Sidebar Design */
        .sidebar { width: 360px; background: var(--bg-sidebar); display: flex; flex-direction: column; border-right: 1px solid #e0e0e0; position: relative; }
        .sidebar-content { padding: 20px; flex-grow: 1; overflow-y: auto; padding-bottom: 200px; }
        
        .option-group { margin-bottom: 18px; }
        label { display: block; font-size: 0.85rem; font-weight: 700; margin-bottom: 5px; color: var(--primary); }
        select, input { width: 100%; padding: 10px; border-radius: 8px; border: 1.5px solid #ddd; font-family: inherit; box-sizing: border-box; }
        
        .upload-btn { display: block; background: #333; color: white; text-align: center; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 15px; }

        /* Payment & Contact */
        .payment-box { background: #fff; padding: 15px; border-radius: 10px; border: 1px solid #ddd; border-left: 5px solid var(--accent); margin-top: 15px; font-size: 0.85rem; }
        .qr-btn { background: var(--accent); color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; margin-top: 8px; font-weight: bold; width: 100%; }

        /* Footer & Summary */
        .sidebar-footer { position: absolute; bottom: 0; left: 0; right: 0; background: var(--bg-sidebar); padding: 15px 20px; border-top: 1px solid #ddd; box-shadow: 0 -5px 10px rgba(0,0,0,0.05); }
        .summary-box { background: #000; color: white; padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 8px; }
        .price-value { font-size: 1.8rem; font-weight: 700; }
        .order-btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }

        /* Render Area */
        #render-area { flex-grow: 1; position: relative; background: #eee; }
        
        /* Modal QR Code */
        #qr-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; justify-content:center; align-items:center; flex-direction: column; }
        .modal-content { background:white; padding:20px; border-radius:15px; text-align:center; position: relative; }
        .close-modal { position: absolute; top: 10px; right: 15px; font-size: 1.5rem; cursor: pointer; }
    </style>
</head>
<body>

    <div id="qr-modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-modal" onclick="document.getElementById('qr-modal').style.display='none'">&times;</span>
            <h3 style="margin-top:0;">QR Code พร้อมเพย์</h3>
            <img src="105446.jpg" alt="QR Code" style="width:280px; height:auto; border: 1px solid #eee;" onerror="this.src='https://via.placeholder.com/280?text=Scan+QR+Payment'">
            <p style="color:#666; font-size:0.8rem; margin-top:10px;">สแกนโอนเงินผ่านแอปธนาคารของคุณ</p>
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-content">
            <h2 style="text-align:center; color:var(--primary);">3D PRINT SERVICE</h2>
            
            <label class="upload-btn">📂 เลือกไฟล์ STL <input type="file" id="file-input" accept=".stl" style="display:none"></label>

            <div class="option-group">
                <label>1. วัสดุ (Material)</label>
                <select id="material" onchange="updateMaterialUI()">
                    <option value="pla_pro">PLA Pro (ผิวสวย/ตั้งโชว์)</option>
                    <option value="petg_hf">PETG HF (เหนียว/ของใช้)</option>
                    <option value="abs">ABS/ASA (ทนร้อน/วิศวกรรม)</option>
                </select>
                <div id="color-palette" style="display:flex; gap:8px; margin-top:10px;"></div>
            </div>

            <div class="option-group">
                <label>2. ความหนาแน่นเนื้อใน (Infill)</label>
                <select id="infill" onchange="updatePrice()">
                    <option value="0.15">15% (ประหยัด)</option>
                    <option value="0.30">30% (มาตรฐาน)</option>
                    <option value="0.50">50% (แข็งแรง)</option>
                    <option value="0.75">75% (แข็งแรงมาก)</option>
                    <option value="0.80">80% (งานวิศวกรรม)</option>
                    <option value="1.00">100% (เนื้อตัน)</option>
                </select>
            </div>

            <div class="option-group">
                <label>3. อีเมลของคุณ (สำหรับติดต่อกลับ)</label>
                <input type="email" id="user-email" placeholder="=ชื่อของคุณ@gmail.com">
            </div>

            <div class="payment-box">
                <strong>💰 ช่องทางชำระเงิน</strong><br>
                ธนาคาร: <strong>กสิกรไทย (KBANK)</strong><br>
                เลขบัญชี: <strong>0XX-X-XXXXX-X</strong><br>
                ชื่อ: <strong>นาย/นางสาว XXXXX XXXXX</strong><br>
                <button class="qr-btn" onclick="document.getElementById('qr-modal').style.display='flex'">📸 ดู QR Code พร้อมเพย์</button>
            </div>
            
            <div style="font-size: 0.75rem; color: #666; margin-top: 15px; line-height: 1.4;">
                📞 ติดต่อสอบถาม: 0XX-XXX-XXXX<br>
                🆔 LINE: @YourID
            </div>
        </div>

        <div class="sidebar-footer">
            <div class="summary-box">
                <div style="font-size:0.7rem; opacity:0.8;">ราคาสุทธิประเมิน (ไม่รวมค่าส่ง)</div>
                <div class="price-value">฿ <span id="val-price">0.00</span></div>
            </div>
            <button class="order-btn" onclick="processOrder()">📧 ส่งหลักฐานทาง Gmail</button>
        </div>
    </div>

    <div id="render-area"></div>

    <script>
        const MY_CONFIG = {
            shopEmail: "varis22521@gmail.com", // <-- ใส่ Gmail ของคุณที่นี่
            setupFee: 50,
            materials: {
                pla_pro: { name: "PLA Pro", price: 1.6, density: 1.25, colors: ["#111111", "#ffffff", "#ff4d4d", "#4caf50"] },
                petg_hf: { name: "PETG HF", price: 1.5, density: 1.27, colors: ["#3498db", "#ff9800", "#ffffff"] },
                abs: { name: "ABS/ASA", price: 2.0, density: 1.07, colors: ["#444444", "#888888"] }
            }
        };

        let scene, camera, renderer, controls, mesh, modelVol = 0, currentFileName = "", selectedColor = "", selectedColorName = "";

        function init() {
            scene = new THREE.Scene(); scene.background = new THREE.Color(0xffffff);
            camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 360) / window.innerHeight, 0.1, 10000);
            camera.position.set(200, 200, 200);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth - 360, window.innerHeight);
            document.getElementById('render-area').appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 1.2));
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            updateMaterialUI();
            animate();
        }

        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0]; if (!file) return;
            currentFileName = file.name;
            const reader = new FileReader();
            reader.onload = function(event) {
                const geometry = new THREE.STLLoader().parse(event.target.result);
                if (mesh) scene.remove(mesh);
                mesh = new THREE.Mesh(geometry, new THREE.MeshPhongMaterial({ color: selectedColor }));
                geometry.computeBoundingBox(); geometry.center();
                scene.add(mesh);
                modelVol = calculateVolume(geometry) / 1000;
                updatePrice();
            };
            reader.readAsArrayBuffer(file);
        });

        function calculateVolume(geometry) {
            let vol = 0; const pos = geometry.attributes.position;
            for (let i = 0; i < pos.count; i += 3) {
                const v1 = new THREE.Vector3().fromBufferAttribute(pos, i), v2 = new THREE.Vector3().fromBufferAttribute(pos, i+1), v3 = new THREE.Vector3().fromBufferAttribute(pos, i+2);
                vol += v1.dot(v2.cross(v3)) / 6.0;
            }
            return Math.abs(vol);
        }

        function updateMaterialUI() {
            const matKey = document.getElementById('material').value;
            const mat = MY_CONFIG.materials[matKey];
            const palette = document.getElementById('color-palette');
            palette.innerHTML = "";
            mat.colors.forEach((hex, i) => {
                let dot = document.createElement('div');
                dot.style.width = '30px'; dot.style.height = '30px'; dot.style.borderRadius = '50%';
                dot.style.backgroundColor = hex; dot.style.cursor = 'pointer';
                dot.style.border = (selectedColor === hex) ? '3px solid #d44638' : '1px solid #ccc';
                dot.onclick = () => { selectedColor = hex; if(mesh) mesh.material.color.set(hex); updateMaterialUI(); };
                palette.appendChild(dot);
                if(i === 0 && !selectedColor) selectedColor = hex;
            });
            updatePrice();
        }

        function updatePrice() {
            const matKey = document.getElementById('material').value;
            const mat = MY_CONFIG.materials[matKey];
            const infill = parseFloat(document.getElementById('infill').value);
            const weight = modelVol * mat.density * (infill * 0.9 + 0.1);
            let total = (weight * mat.price) + MY_CONFIG.setupFee;
            document.getElementById('val-price').innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2});
        }

        function processOrder() {
            const userEmail = document.getElementById('user-email').value;
            const infillText = document.getElementById('infill').options[document.getElementById('infill').selectedIndex].text;
            if(currentFileName === "" || userEmail === "") { alert("กรุณาอัปโหลดไฟล์และใส่อีเมลของคุณก่อนครับ"); return; }
            
            const price = document.getElementById('val-price').innerText;
            const matName = MY_CONFIG.materials[document.getElementById('material').value].name;
            const subject = `สั่งปริ้น3D: ${currentFileName}`;
            const details = `ยืนยันออเดอร์ใหม่!\n------------------\n📄 ไฟล์: ${currentFileName}\n🛠 วัสดุ: ${matName}\n🎯 Infill: ${infillText}\n💰 ราคาประเมิน: ฿${price}\n📧 อีเมลติดต่อกลับ: ${userEmail}\n------------------\n⚠️ กรุณาแนบไฟล์ .stl และรูปสลิปการโอนเงินมาในเมลนี้ด้วยนะครับ`;
            
            window.open(`https://mail.google.com/mail/?view=cm&fs=1&to=${MY_CONFIG.shopEmail}&su=${encodeURIComponent(subject)}&body=${encodeURIComponent(details)}`, '_blank');
        }

        function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
        init();
    </script>
</body>
</html>
